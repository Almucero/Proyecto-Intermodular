<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111827; /* Slate 900 / gray 900 color for high-end look */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #checkout {
            width: 100%;
            max-width: 500px;
            padding: 16px;
            box-sizing: border-box;
        }
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #111827;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #22d3ee; /* Cyan 400 */
            animation: spin 1s linear infinite;
        }
        .loading-text {
            margin-top: 16px;
            font-size: 14px;
            color: #9ca3af; /* Slate 400 */
            letter-spacing: 0.5px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="loader-container" id="loader-container">
        <div class="loader"></div>
        <div class="loading-text" id="loading-text">Cargando pasarela de pago...</div>
    </div>
    
    <div id="checkout">
    </div>

    <script>
        // Obtener parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const publishableKey = urlParams.get('publishableKey');
        const clientSecret = urlParams.get('clientSecret');
        const sessionId = urlParams.get('sessionId');
        const localeParam = (urlParams.get('locale') || 'es').toLowerCase().substring(0, 2);

        // Diccionario de traducciones para el cargador y estados de error
        const translations = {
            es: {
                loading: "Cargando pasarela de pago...",
                invalidParams: "Error: Parámetros inválidos",
                initError: "Error al iniciar el pago: "
            },
            en: {
                loading: "Loading payment gateway...",
                invalidParams: "Error: Invalid parameters",
                initError: "Error starting payment: "
            },
            fr: {
                loading: "Chargement de la passerelle de paiement...",
                invalidParams: "Erreur : Paramètres invalides",
                initError: "Erreur lors du démarrage du paiement : "
            },
            de: {
                loading: "Zahlungs-Gateway wird geladen...",
                invalidParams: "Fehler: Ungültige Parameter",
                initError: "Fehler beim Starten der Zahlung: "
            },
            it: {
                loading: "Caricamento del gateway di pagamento...",
                invalidParams: "Errore: Parametri non validi",
                initError: "Errore durante l'avvio del pagamento: "
            }
        };

        const t = translations[localeParam] || translations['es'];
        const loadingElement = document.getElementById('loading-text');

        // Establecer texto de carga inicial localizado
        loadingElement.innerText = t.loading;

        if (!publishableKey || !clientSecret) {
            console.error("Faltan parámetros publishableKey o clientSecret");
            loadingElement.innerText = t.invalidParams;
        } else {
            // Inicializar Stripe
            const stripe = Stripe(publishableKey);

            async function initialize() {
                try {
                    const checkout = await stripe.createEmbeddedCheckoutPage({
                        clientSecret: clientSecret,
                        onComplete: function() {
                            console.log("Pago completado, sessionId: " + sessionId);
                            if (window.StripeAndroid) {
                                window.StripeAndroid.onPaymentCompleted(sessionId);
                            } else {
                                console.log("Interfaz nativa StripeAndroid no encontrada");
                            }
                        }
                    });

                    // Montar checkout
                    checkout.mount('#checkout');
                    
                    // Ocultar cargador una vez montado
                    setTimeout(() => {
                        document.getElementById('loader-container').classList.add('hidden');
                    }, 800);
                } catch (e) {
                    console.error("Error al iniciar Stripe Embedded Checkout:", e);
                    loadingElement.innerText = t.initError + e.message;
                }
            }

            initialize();
        }
    </script>
</body>
</html>
