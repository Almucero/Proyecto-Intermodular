<div class="flex-1 w-full bg-gray-900 text-white font-sans pb-4">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
    <div class="flex flex-col sm:flex-row gap-8 sm:items-start">
      <div class="flex-1 order-2 sm:order-1 results-scroller sidebar-scroll" #resultsScroller
        (scroll)="onScroll($event)">

        <!-- Estado de carga: Skeletons (Inicio o Reset total) -->
        <div *ngIf="isLoadingFilters && loadingType === 'skeletons'"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-0 search-results-grid">
          <app-game-card *ngFor="let skeleton of skeletons" [game]="skeleton" [fullWidth]="true"></app-game-card>
        </div>

        <!-- Estado de carga: Rueda (Cambio de filtros activos o búsqueda de texto) -->
        <div *ngIf="isLoadingFilters && loadingType === 'spinner'" class="filter-loader-container">
          <div class="loader-spinner"></div>
        </div>

        <ng-container *ngIf="!isLoadingFilters">
          <div *ngIf="filteredGames.length > 0"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-0 search-results-grid">
            <app-game-card *ngFor="let game of filteredGames" [game]="game" [coverUrl]="getCoverUrl(game)"
              [fullWidth]="true" (cardClick)="goToProduct($event)"></app-game-card>
          </div>

          <div *ngIf="filteredGames.length === 0 && hasLoadedOnce" class="text-center text-gray-400 py-20">
            <p class="text-xl">{{ "search.noResults" | translate }}</p>
          </div>
        </ng-container>
      </div>

      <div class="w-full sm:w-80 order-1 sm:order-2">
        <div class="filters-sidebar sticky top-24">
          <div class="sidebar-header">
            <h3 class="text-xl font-black text-cyan-300">
              {{ "search.title" | translate }}
            </h3>
          </div>

          <div class="filters-scroll-area sidebar-scroll" #filtersScroller (scroll)="onScroll($event)">
            <div class="filters-grid-wrapper" [class.is-collapsing]="activeFilters.length === 0 || isClearingFilters" [class.ready]="viewReady">
              <div class="filters-grid-inner">
                <div class="flex flex-wrap gap-2">
                  @for (filter of activeFilters; track filter.type) {
                  <div class="active-filter-chip">
                    <span>{{ filter.label | translate }}</span>
                    <button (click)="removeFilter(filter.type)"
                      class="hover:text-red-400 transition-colors filter-button-style appearance-none cursor-pointer flex items-center justify-center font-bold text-lg leading-none"
                      [title]="'search.removeFilter' | translate">
                      &times;
                    </button>
                  </div>
                  }
                </div>

                <div class="my-2 flex justify-start">
                  <button (click)="resetFilters()"
                    class="text-cyan-400 hover:text-cyan-300 text-[10px] font-bold transition-colors reset-button-style appearance-none cursor-pointer uppercase tracking-widest">
                    {{ "search.reset" | translate }} ({{ activeFilters.length }})
                  </button>
                </div>
              </div>
            </div>
            <div class="filter-group-container">
              <!-- Precio -->
              <div class="filter-card" [class.is-open]="filtersExpanded['price']">
                <button (click)="toggleFilter('price')" class="filter-header-button"
                  [class.is-open]="filtersExpanded['price']">
                  {{ "search.filters.price.label" | translate }}
                </button>

                <div *ngIf="filtersExpanded['price']" [@expandCollapse] class="filter-content-body">
                  <div class="space-y-1">
                    <div *ngFor="let option of priceOptions" (click)="togglePrice(option.value)"
                      class="filter-option-item" [class.is-selected]="selectedPrice === option.value">
                      <span>{{ option.label | translate }}</span>
                      <span *ngIf="selectedPrice === option.value" class="text-cyan-400">&check;</span>
                    </div>
                  </div>

                  <div class="filter-slider-container">
                    <label class="block text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">Máximo: <span
                        class="text-cyan-300 ml-1">{{ formatPrice(priceValue) }}</span></label>
                    <input type="range" [min]="minPrice" [max]="maxPrice" [(ngModel)]="priceValue"
                      (change)="onPriceSliderChange()"
                      class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-cyan-500" />
                    <div class="flex justify-between text-[10px] font-bold text-gray-500 mt-2 uppercase">
                      <span>{{ formatPrice(minPrice) }}</span>
                      <span>{{ formatPrice(maxPrice) }}</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Genero -->
              <div class="filter-card" [class.is-open]="filtersExpanded['genre']">
                <button (click)="toggleFilter('genre')" class="filter-header-button"
                  [class.is-open]="filtersExpanded['genre']">
                  {{ "search.filters.genre.label" | translate }}
                </button>

                <div *ngIf="filtersExpanded['genre']" [@expandCollapse] class="filter-content-body">
                  <div class="filter-options-scroll" (scroll)="onScroll($event)">
                    <div class="space-y-1">
                      <div *ngFor="let option of genreOptions" (click)="toggleGenre(option.value)"
                        class="filter-option-item" [class.is-selected]="selectedGenres.includes(option.value)">
                        <span>{{ option.label | translate }}</span>
                        <span *ngIf="selectedGenres.includes(option.value)" class="text-cyan-400">&check;</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Plataforma -->
              <div class="filter-card" [class.is-open]="filtersExpanded['platform']">
                <button (click)="toggleFilter('platform')" class="filter-header-button"
                  [class.is-open]="filtersExpanded['platform']">
                  {{ "search.filters.platform.label" | translate }}
                </button>

                <div *ngIf="filtersExpanded['platform']" [@expandCollapse] class="filter-content-body">
                  <div class="space-y-1">
                    <div *ngFor="let option of platformOptions" (click)="togglePlatform(option.value)"
                      class="filter-option-item" [class.is-selected]="selectedPlatform === option.value">
                      <span>{{ option.label }}</span>
                      <span *ngIf="selectedPlatform === option.value" class="text-cyan-400">&check;</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
