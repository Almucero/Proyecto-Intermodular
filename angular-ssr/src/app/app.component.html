<!--
  @file: src/app/app.component.html
  @project: GameSage - Plataforma de Videojuegos
  @authors: Rosario González y Álvaro Jiménez
  @description: Estructura principal de la aplicación con componentes de loading, header, contenido dinámico y footer, gestionando transiciones de pantalla y confirmación de navegación.
-->

<div class="app-container" [class.lang-changing]="isLangChanging">
  <app-loading *ngIf="isLoading" [@leaveAnimation]="{
      value: ':leave',
      params: { duration: exitAnimationDuration },
    }" (@leaveAnimation.done)="onLoaderAnimationDone()"></app-loading>
  <app-header [@headerRevealAnimation]="{
      value: headerRevealEnabled ? (isLoading ? 'hidden' : 'visible') : 'visible',
      params: { delay: headerRevealEnabled ? exitAnimationDuration : '0ms' },
    }"></app-header>
  <div class="main-content" [@revealAnimation]="{
      value: isLoading ? 'hidden' : 'visible',
      params: { duration: exitAnimationDuration },
    }">
    <div class="route-container" [class.route-hidden]="isRouteHidden" [class.route-entering]="isRouteEntering">
      <router-outlet (activate)="onRouteActivated()"></router-outlet>
    </div>
    <app-error-toast></app-error-toast>
    <app-footer></app-footer>
  </div>

  @if (confirmNav.visible()) {
  <div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-gray-900 rounded-xl max-w-md w-full p-6 shadow-2xl"
      style="border: 1px solid rgba(148, 163, 184, 0.28) !important;">
      <h3 class="text-xl font-bold text-white mb-4">
        {{ "unsavedChanges.title" | translate }}
      </h3>
      <p class="text-gray-300 mb-8">
        {{ "unsavedChanges.message" | translate }}
      </p>
      <div class="flex gap-4 justify-end">
        <button (click)="confirmNav.cancel()"
          class="px-6 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition-all font-medium border-0 outline-none">
          {{ "unsavedChanges.stay" | translate }}
        </button>
        <button (click)="confirmNav.accept()"
          class="px-6 py-2 btn-premium-danger text-white rounded-lg transition-all font-medium border-0 outline-none">
          {{ "unsavedChanges.discard" | translate }}
        </button>
      </div>
    </div>
  </div>
  }
  <div class="lang-change-overlay" [class.active]="isLangChanging"></div>
</div>
