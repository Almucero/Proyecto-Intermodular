<div class="app-container">
  <app-loading
    *ngIf="isLoading"
    [@leaveAnimation]="{
      value: ':leave',
      params: { duration: exitAnimationDuration },
    }"
  ></app-loading>
  <app-header
    [@headerRevealAnimation]="{
      value: headerRevealEnabled ? (isLoading ? 'hidden' : 'visible') : 'visible',
      params: { delay: headerRevealEnabled ? exitAnimationDuration : '0ms' },
    }"
  ></app-header>
  <div
    class="main-content"
    [@revealAnimation]="{
      value: isLoading ? 'hidden' : 'visible',
      params: { duration: exitAnimationDuration },
    }"
  >
    <div
      class="route-container"
      [class.route-hidden]="isRouteHidden"
      [class.route-entering]="isRouteEntering"
    >
      <router-outlet (activate)="onRouteActivated()"></router-outlet>
    </div>
    <app-error-toast></app-error-toast>
    <app-footer></app-footer>
  </div>
</div>
